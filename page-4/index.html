<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentalHelp+ | เลือกรูปภาพ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="../asset/logo.svg" class="logo-img" alt="MentalHelp+">
            </div>
        </nav>
    </header>

    <main class="main-container slide-in-right">
        <h1 data-i18n="p4_title">เลือกรูปภาพของคุณ</h1>

        <div class="photo" id="upload-zone">
            <span id="upload-text" data-i18n="p4_upload">+ คลิกเพื่ออัปโหลดรูปภาพ</span>
            <img id="image-workspace" src="" style="display: none;">
            <input type="file" id="file-input" accept="image/*" hidden>
        </div>

        <div class="button-group">
            <button class="retake-btn" id="btn-retake" disabled data-i18n="p4_retake">เลือกใหม่</button>
            <button class="confirm-btn" id="btn-confirm" disabled data-i18n="p4_confirm">เรียบร้อย</button>
        </div>
    </main>

    <div id="crop-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2 data-i18n="p4_crop_title">ปรับขนาดรูปภาพ</h2>
            <div class="crop-workspace">
                <img id="image-to-crop" src="" alt="Workspace">
            </div>
            <div class="modal-actions">
                <button id="btn-cancel-crop" class="cancel-btn" data-i18n="p4_crop_cancel">ยกเลิก</button>
                <button id="btn-apply-crop" class="apply-btn" data-i18n="p4_crop_apply">ยืนยันการตัดรูป</button>
            </div>
        </div>
    </div>

    <script src="../sound-bridge.js"></script>
    <script src="../settings.js"></script>
    <script src="lang.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
